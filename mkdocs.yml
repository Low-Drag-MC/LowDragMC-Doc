site_name: LowDragMC
copyright: Copyright &copy; 2019 - 2025 KilaBash
site_url: https://low-drag-mc.github.io/LowDragMC-Doc/
repo_url: https://github.com/Low-Drag-MC
repo_name: Low-Drag-MC
theme:
  name: material
  logo: assets/icon.png
  icon:
    favicon: assets/icon.png
    touchicon: assets/icon.png
  pygments_style: friendly
  features:
    - navigation.sections
    - navigation.path
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette: 
    # Palette toggle for light mode
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
extra:
  generator: false
extra_css:
  - css/custom.css
  - css/java-enhance.css

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /en/
        - locale: zh
          name: 中文
          build: true
          link: /zh/
          nav:
            - 首页: index.zh.md
            - LDLib2: ldlib2/index.zh.md
  - search
  - macros
  - glightbox
  - tags
  - awesome-pages
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
markdown_extensions:
  - attr_list
  - tables
  - md_in_html
  - pymdownx.emoji
  - pymdownx.blocks.caption
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true


